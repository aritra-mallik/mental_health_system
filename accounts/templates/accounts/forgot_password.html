{% extends "base.html" %}
{% load i18n static %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
{% include "accounts/intro_header.html" %}
<style>
    /* The Magic "Grain" Texture - Sunset Edition */
    .bg-texture-orange {
        background-color: #fff7ed; /* Light peachy-orange base */
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Cfilter id='noiseFilter'%3%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3%3C/filter%3%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3%3C/svg%3");
        background-blend-mode: overlay;
        opacity: 0.5;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
        from { width: 0; opacity: 0; }
        to { width: 2.5rem; opacity: 1; }
    }
    .animate-fade { animation: fadeIn 0.8s ease-out forwards; }
    .animate-card { animation: fadeIn 1.2s ease-out forwards; }
</style>

<div class="min-h-screen flex items-center justify-center bg-[#af4304] relative overflow-hidden">
    
    <div class="absolute inset-0 bg-texture-orange pointer-events-none"></div>
    
    <div class="absolute top-[-5%] left-[-10%] w-[45rem] h-[45rem] bg-orange-200/40 blur-[120px] rounded-full"></div>
    <div class="absolute bottom-[-10%] right-[-5%] w-[30rem] h-[30rem] bg-amber-100/50 blur-[100px] rounded-full"></div>

    <div class="relative w-full max-w-md px-6 py-12">
        
        <div class="text-center mb-10 animate-fade">
            <h2 class="text-4xl font-serif font-bold text-[#044b01] tracking-tight">Regain Access 🥬</h2>
            <p class="text-[#9a3412] mt-3 text-base italic">It happens to the best of us. Let’s get you back in.</p>
        </div>

        <div class="bg-white/40 backdrop-blur-xl border border-white/60 shadow-[0_20px_50px_rgba(124,45,18,0.05)] rounded-[3rem] p-8 md:p-10 animate-card relative">
            
            <div class="text-center mb-8 animate-[fadeIn_1s_ease-out]">
                <h1 class="text-2xl font-black tracking-[0.27em] text-amber-900/90 uppercase">
                    Forgot Password
                </h1>
                <div class="h-1.5 w-10 bg-amber-400/40 mx-auto mt-3 rounded-full shadow-sm animate-[scaleIn_1.2s_ease-out]"></div>
            </div>

            <div class="space-y-6 relative z-10">
                {% csrf_token %}
                
                <div class="space-y-2">
                    <label class="block text-[10px] font-bold text-[#9a3412] uppercase tracking-widest ml-1">Enter Registered Email</label>
                    <input id="email" type="email" 
                        class="w-full px-6 py-4 bg-white/50 border border-orange-400/60 rounded-2xl focus:ring-2 focus:ring-orange-400 focus:bg-white outline-none transition-all placeholder:text-orange-200 text-[#7c2d12]" 
                        placeholder="yourname@university.edu">
                </div>

                <div class="pt-4">
                    <button onclick="send()" 
                        class="w-full py-4 bg-[#7c2d12] text-orange-50 rounded-2xl font-bold text-lg shadow-lg hover:bg-[#9a3412] active:scale-[0.98] transition-all transform duration-300">
                        Send Recovery Code
                    </button>
                </div>
            </div>

            <div class="mt-10 text-center">
                <button onclick="window.location.href='/api/accounts/login-page/'" class="text-sm font-medium text-[#9a3412]/70 hover:text-[#7c2d12] flex items-center justify-center mx-auto transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    Back to Login
                </button>
            </div>
        </div>
    </div>
</div>

<script>
function getCSRFToken() {
    return document.cookie
        .split("; ")
        .find(row => row.startsWith("csrftoken"))
        ?.split("=")[1];
}

async function send(){
const { res } = await apiRequest(
    "/api/accounts/password-reset/",
    "POST",
    { email: email.value }
);

if(res.ok){
    location.href="/api/accounts/reset-password/?email="+email.value
}
}
</script>

{% endblock %}
