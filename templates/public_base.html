{% load static %}
{% load i18n static %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Mental Health Support{% endblock %}</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  {% block extra_head %}{% endblock %}
</head>

  <body id="app-body" data-auth="false" class="bg-gray-50 text-gray-900 min-h-screen">

  <!-- ❌ No navbar -->
  <!-- ❌ No footer (optional, but cleaner for auth UX) -->

  <!-- Toast (still needed) -->
  <div id="toast-container"
       class="fixed top-5 left-1/2 -translate-x-1/2 z-50 space-y-2"></div>

  <main class="max-w-7xl mx-auto p-4 rounded-md">
    {% block content %}{% endblock %}
  </main>

  <!-- Shared JS -->
  <script src="{% static 'js/main.js' %}"></script>

  {% block extra_js %}{% endblock %}

  <div id="global-loader"
       class="fixed inset-0 bg-black/30 flex items-center justify-center hidden z-50">
    <div class="w-12 h-12 border-4 border-white border-t-transparent rounded-full animate-spin"></div>
  </div>

</body>
</html>
