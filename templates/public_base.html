{% load static %}
{% load i18n static %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Mental Health Support{% endblock %}</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  {% block extra_head %}{% endblock %}
</head>

  <body id="app-body" data-auth="false" class="bg-gray-50 text-gray-900 min-h-screen">

  <!-- ❌ No navbar -->
  <!-- ❌ No footer (optional, but cleaner for auth UX) -->

  <!-- Toast (still needed) -->
  <div id="toast-container" class="fixed top-5 left-1/2 -translate-x-1/2 z-50 space-y-2"></div>

  <main class="max-w-7xl mx-auto p-4 rounded-md">
    {% block content %}{% endblock %}
  </main>

  <!-- Shared JS -->
  <script src="{% static 'js/main.js' %}"></script>

  {% block extra_js %}{% endblock %}

  <div id="global-loader" class="fixed inset-0 bg-[#080c16]/40 backdrop-blur-md flex items-center justify-center hidden z-50 transition-opacity duration-500">
    
      <!-- Ambient Background Glow -->
      <div class="absolute w-64 h-64 bg-amber-500/10 rounded-full blur-[80px] pointer-events-none"></div>

      <div class="relative flex flex-col items-center justify-center gap-12 z-10">

          <!-- Realistic Rotating Hourglass -->
          <div class="relative flex flex-col items-center animate-[premiumFlip_4s_cubic-bezier(0.65,0,0.35,1)_infinite]">
              
              <!-- Top Brass Cap -->
              <div class="relative w-24 h-3 bg-gradient-to-r from-amber-700 via-amber-300 to-amber-800 rounded-sm border-t border-amber-200/60 shadow-[0_5px_15px_rgba(0,0,0,0.5)] z-20">
                  <div class="absolute inset-0 bg-gradient-to-b from-transparent to-black/30 rounded-sm"></div>
              </div>

              <!-- Top Glass Bulb -->
              <div class="relative w-20 h-20 bg-white/5 backdrop-blur-[2px] border-x border-white/20 shadow-[inset_0_0_15px_rgba(255,255,255,0.15),inset_0_0_5px_rgba(255,255,255,0.4)] overflow-hidden z-10" style="border-radius: 4px 4px 50% 50%;">
                  
                  <!-- Glass Glare / Reflection -->
                  <div class="absolute top-2 right-2 w-3 h-12 bg-gradient-to-b from-white/40 to-transparent rounded-full blur-[1px] rotate-12"></div>
                  
                  <!-- Draining Sand -->
                  <div class="absolute bottom-0 left-0 w-full h-full bg-gradient-to-br from-amber-200 to-yellow-600 animate-[premiumDrain_4s_ease-in-out_infinite] origin-bottom shadow-[inset_0_-5px_10px_rgba(0,0,0,0.2)]"></div>
              </div>

              <!-- Center Glass Neck & Connecting Ring -->
              <div class="relative w-7 h-5 -my-2 flex justify-center items-center z-30">
                  <!-- Brass Connector Ring -->
                  <div class="absolute w-8 h-2 bg-gradient-to-r from-amber-700 via-amber-300 to-amber-800 rounded-full shadow-sm z-30"></div>
                  <!-- Glass Neck Background -->
                  <div class="absolute w-5 h-6 bg-white/10 backdrop-blur-sm border-x border-white/30 rounded-full shadow-[inset_0_0_5px_rgba(255,255,255,0.4)] z-10"></div>
                  
                  <!-- Falling Sand Stream -->
                  <div class="absolute top-1 w-[2.5px] h-24 bg-gradient-to-b from-amber-300 to-yellow-600 animate-[premiumStream_4s_ease-in-out_infinite] z-20 drop-shadow-[0_0_2px_rgba(251,191,36,0.8)]"></div>
              </div>

              <!-- Bottom Glass Bulb -->
              <div class="relative w-20 h-20 bg-white/5 backdrop-blur-[2px] border-x border-white/20 shadow-[inset_0_0_15px_rgba(255,255,255,0.15),inset_0_0_5px_rgba(255,255,255,0.4)] overflow-hidden z-10 flex items-end justify-center" style="border-radius: 50% 50% 4px 4px;">
                  
                  <!-- Glass Glare / Reflection -->
                  <div class="absolute bottom-2 right-2 w-3 h-12 bg-gradient-to-t from-white/40 to-transparent rounded-full blur-[1px] -rotate-12 z-20"></div>
                  
                  <!-- Filling Sand (With curved top to simulate a pile) -->
                  <div class="relative w-full h-0 bg-gradient-to-tr from-amber-300 to-yellow-600 animate-[premiumFill_4s_ease-in-out_infinite] shadow-[inset_0_5px_10px_rgba(0,0,0,0.1)] z-10" style="border-radius: 50% 50% 0 0;"></div>
              </div>

              <!-- Bottom Brass Cap -->
              <div class="relative w-24 h-3 bg-gradient-to-r from-amber-700 via-amber-300 to-amber-800 rounded-sm border-b border-black/40 shadow-[0_-5px_15px_rgba(0,0,0,0.5)] z-20">
                  <div class="absolute inset-0 bg-gradient-to-t from-transparent to-black/30 rounded-sm"></div>
              </div>

          </div>

          <!-- Premium Typography -->
          <div class="flex flex-col items-center gap-2">
              <span class="text-xs font-medium tracking-[0.4em] uppercase text-amber-500/80 animate-pulse">
                  Please Wait
              </span>
              <span class="text-[10px] tracking-widest text-slate-400 uppercase drop-shadow-md">
                  Synchronizing Data
              </span>
          </div>

      </div>

      <!-- Realistic Keyframe Animations -->
      <style>
          /* Smooth, weighty 180-degree flip */
          @keyframes premiumFlip {
              0%, 45% { transform: rotate(0deg); }
              55%, 100% { transform: rotate(180deg); }
          }
          
          /* Drains smoothly from the top */
          @keyframes premiumDrain {
              0% { transform: scaleY(1); }
              40%, 100% { transform: scaleY(0); }
          }
          
          /* Fills the bottom, simulating a rising pile of sand */
          @keyframes premiumFill {
              0% { height: 0%; border-radius: 50% 50% 0 0; }
              40%, 100% { height: 100%; border-radius: 0 0 0 0; }
          }
          
          /* The falling sand cuts off exactly when the rotation starts */
          @keyframes premiumStream {
              0% { opacity: 0; transform: translateY(-10px); }
              5% { opacity: 1; transform: translateY(0); }
              38% { opacity: 1; }
              40%, 100% { opacity: 0; }
          }
      </style>
  </div>

</body>
</html>
