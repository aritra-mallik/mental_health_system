{% extends "base.html" %}

{% block title %}Chat{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10 bg-white p-6 rounded-2xl shadow">

    <!-- Top Bar -->
    <div class="flex justify-between items-center mb-4">
        <button onclick="goHome()" 
                class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-semibold">
            ← Dashboard
        </button>

        <h2 class="text-lg font-bold">Chatbot</h2>
    </div>

    <!-- Chat Messages -->
    <div id="messages" 
         class="border p-3 h-80 overflow-y-auto mb-4 rounded bg-gray-50">
    </div>

    <!-- Input + Send -->
    <div class="flex gap-2">
        <input id="chatInput"
               type="text"
               class="flex-1 border p-2 rounded"
               placeholder="Type a message..." />

        <button onclick="sendMessage()"
                class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-semibold">
            Send
        </button>
    </div>

</div>
{% endblock %}


{% block extra_js %}
<script>
let sessionId = null;

// -------- NAVIGATION --------
function goHome(){
    window.location.href = "/api/core/dashboard-page/";
}

// -------- SESSION --------
async function startChat(){
    const token = localStorage.getItem("access");

    try {
        const res = await fetch("/api/core/chat/create/", {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        const data = await res.json();

        if (!res.ok) {
            alert("Failed to start chat");
            return;
        }

        sessionId = data.session_id;

    } catch (err) {
        console.error(err);
        alert("Error starting chat");
    }
}

// -------- UI --------
function appendMessage(role, text){
    const msgBox = document.getElementById("messages");

    const div = document.createElement("div");

    div.className = role === "user"
        ? "text-right mb-2"
        : "text-left mb-2";

    div.innerHTML = `
        <span class="inline-block px-3 py-2 rounded ${
            role === "user"
            ? "bg-blue-600 text-white"
            : "bg-gray-200 text-black"
        }">
            ${text}
        </span>
    `;

    msgBox.appendChild(div);
    msgBox.scrollTop = msgBox.scrollHeight;
}

// -------- CHAT --------
async function sendMessage(){
    const input = document.getElementById("chatInput");
    const text = input.value.trim();

    if (!text) return;

    if (!sessionId) {
        alert("Chat not initialized");
        return;
    }

    appendMessage("user", text);
    input.value = "";

    const token = localStorage.getItem("access");

    try {
        const res = await fetch("/api/core/chat/send/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                session_id: sessionId,
                message: text
            })
        });

        const data = await res.json();

        if (!res.ok) {
            appendMessage("bot", "Error generating response");
            return;
        }

        appendMessage("bot", data.reply);

    } catch (err) {
        console.error(err);
        appendMessage("bot", "Network error");
    }
}

// -------- INIT --------
document.addEventListener("DOMContentLoaded", () => {

    if (!localStorage.getItem("access")) {
        window.location.href = "/api/accounts/login-page/";
        return;
    }

    startChat();

    document.getElementById("chatInput")
        .addEventListener("keypress", function(e){
            if(e.key === "Enter"){
                sendMessage();
            }
        });
});
</script>
{% endblock %}
