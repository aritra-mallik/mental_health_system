{% extends "base.html" %}
{% load static %}

{% block title %}Chat with Smera{% endblock %}

{% block content %}
<style>
    /* Hide global loader for the chat interface */
    #global-loader { display: none !important; }

    /* Clean Scrollbars */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; }
    
    #chatBox { scroll-behavior: smooth; }

    /* Subtle Fade In */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .msg-animate { animation: fadeIn 0.3s ease-out forwards; }

    /* GPT Style Typing Indicator */
    .typing-dot {
        width: 6px; height: 6px;
        background-color: currentColor;
        border-radius: 50%;
        display: inline-block;
        animation: typingBounce 1.4s infinite ease-in-out both;
    }
    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes typingBounce {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
    }
    /* Gentle up and down floating motion */
    @keyframes smeraFloat {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
    }
        
    /* Occasional natural blink */
    @keyframes smeraBlink {
        0%, 94%, 98%, 100% { transform: scaleY(1); }
        96% { transform: scaleY(0.1); }
    }

    /* Subtle glowing/pulsing effect on the blush */
    @keyframes smeraBlush {
        0%, 100% { fill-opacity: 0.6; transform: scale(1); }
        50% { fill-opacity: 0.8; transform: scale(1.1); }
    }
    .Smera-float {
        animation: smeraFloat 4s ease-in-out infinite;
    }
    .smera-eye {
        animation: smeraBlink 5s infinite;
    }
    /* Transform origins must match the exact cx/cy coordinates to scale properly */
    .eye-left { transform-origin: 35px 45px; }
    .eye-right { transform-origin: 65px 45px; }
    .smera-cheek {
        animation: smeraBlush 4s ease-in-out infinite;
    }
    .cheek-left { transform-origin: 30px 55px; }
    .cheek-right { transform-origin: 70px 55px; }
</style>

<div class="flex h-[calc(100vh-80px)] mt-2 mx-auto max-w-screen-2xl bg-white dark:bg-[#111827] rounded-2xl overflow-hidden border border-gray-200 dark:border-gray-800 shadow-sm relative">

    <!-- OVERLAY FOR MOBILE -->
    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm hidden z-40 md:hidden transition-opacity"></div>

    <!-- COLLAPSIBLE SIDEBAR -->
    <aside id="chatSidebar" class="absolute z-50 top-0 left-0 h-full w-72 bg-gray-50 dark:bg-[#0b0f19] border-r border-gray-200 dark:border-gray-800 transform -translate-x-full transition-all duration-300 ease-in-out flex flex-col overflow-hidden whitespace-nowrap">
        
        <!-- Sidebar Header & New Chat -->
        <div class="p-4 border-b border-gray-200 dark:border-gray-800">
            <button onclick="createNewChat()" class="w-full flex items-center gap-3 px-4 py-3 bg-white dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-800 dark:text-gray-200 border border-gray-200 dark:border-gray-700 rounded-xl transition-colors font-medium text-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
                </svg>
                New chat
            </button>
        </div>

        <!-- Search History -->
        <div class="px-4 pt-4 pb-2">
            <div class="relative">
                <input type="text" id="chatSearchInput" onkeyup="searchChats()" placeholder="🔍Search..." class="w-full bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 text-sm px-4 py-2.5 rounded-lg border border-gray-200 dark:border-gray-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all placeholder-gray-400">
            </div>
            <h3 class="text-xs font-semibold text-gray-400 mt-4 mb-2 px-1 uppercase tracking-wider">History</h3>
        </div>

        <!-- Chat History List -->
        <div id="chatHistorySidebar" class="flex-1 overflow-y-auto px-2 space-y-1 custom-scrollbar pb-4">
            <!-- Populated via JS -->
        </div>
    </aside>

    <!-- MAIN CHAT AREA -->
    <div class="flex-1 flex flex-col min-w-0 bg-white dark:bg-[#111827] relative transition-all duration-300">
        
        <!-- Top Navigation Bar -->
        <header class="flex items-center justify-between px-4 py-3 border-b border-gray-200 dark:border-gray-800 bg-white/90 dark:bg-[#111827]/90 backdrop-blur-md sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="p-2 text-gray-500 hover:text-gray-800 dark:hover:text-gray-200 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7" />
                    </svg>
                </button>
                
                <!-- NEW: Header Title with Avatar -->
                <div class="flex items-center gap-3 group cursor-default">
                    
                    <!-- Smera's Header Avatar -->
                    <div class="w-8 h-8 rounded-full border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 flex items-center justify-center shrink-0 overflow-hidden shadow-sm">
                        <svg width="100%" height="100%" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="50" cy="50" r="45" class="fill-gray-100"/>
                            <circle cx="35" cy="45" r="4" class="fill-blue-600"/>
                            <circle cx="65" cy="45" r="4" class="fill-blue-600"/>
                            <path d="M40 65C40 65 45 70 50 70C55 70 60 65 60 65" class="stroke-blue-600 dark:stroke-blue-400" stroke-width="3" stroke-linecap="round"/>
                        </svg>
                    </div>
                    
                    <span class="text-xl font-bold text-gray-800 dark:text-gray-100 tracking-wide">Smera</span>
                    
                    <div class="relative flex h-2.5 w-2.5 mt-0.5" title="Smera is online">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]"></span>
                    </div>
                    
                    <span class="text-xs font-medium text-green-500 dark:text-green-400 opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-300">Online</span>
                </div>
            </div>
            
            <button onclick="goDashboard()" class="text-sm font-medium text-gray-500 hover:text-amber-600 dark:text-gray-400 dark:hover:text-amber-500 transition-colors flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                </svg>
                Back to Dashboard
            </button>
        </header>

        <!-- Chat Output Container -->
        <div id="chatBox" class="flex-1 overflow-y-auto w-full custom-scrollbar pb-4 pt-4">
            <!-- Messages go here -->
        </div>

        <!-- Typing Indicator -->
        <div id="typingIndicator" class="hidden w-full max-w-4xl mx-auto px-4 py-4">
            <div class="flex items-center gap-4">
                
                <!-- Smera's Face Avatar -->
                <div class="w-8 h-8 rounded-full border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 flex items-center justify-center shrink-0 overflow-hidden">
                    <svg width="100%" height="100%" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="45" class="fill-gray-100"/>
                        <circle cx="35" cy="45" r="4" class="fill-blue-600"/>
                        <circle cx="65" cy="45" r="4" class="fill-blue-600"/>
                        <path d="M40 65C40 65 45 70 50 70C55 70 60 65 60 65" class="stroke-blue-600 dark:stroke-blue-400" stroke-width="3" stroke-linecap="round"/>
                    </svg>
                </div>
                
                <!-- Thinking Text & Dots -->
                <div class="flex items-baseline gap-1.5 text-[15px] font-medium text-gray-500 dark:text-gray-400">
                    Smera is thinking
                    <div class="flex items-center gap-1 ml-1 mb-0.5">
                        <span class="typing-dot color-red"></span>
                        <span class="typing-dot color-yellow"></span>
                        <span class="typing-dot color-blue"></span>
                    </div>
                </div>

            </div>
        </div>

        <!-- Input Area -->
        <div class="w-full pt-2 pb-6 px-4 bg-gradient-to-t from-white dark:from-[#111827] to-transparent">
            <div class="max-w-4xl mx-auto relative flex items-end gap-2 bg-white/50 dark:bg-gray-800/60 backdrop-blur-xl border border-gray-200 dark:border-gray-700/60 rounded-2xl p-2 shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-[0_8px_30px_rgba(0,0,0,0.2)] focus-within:ring-2 focus-within:ring-blue-500/50 focus-within:border-blue-500/80 transition-all duration-300 group">
                
                <textarea id="chatInput" rows="1" class="flex-1 max-h-32 bg-transparent text-gray-800 dark:text-gray-200 px-3 py-3 resize-none outline-none custom-scrollbar placeholder-gray-500 dark:placeholder-gray-400" placeholder="Message Smera..."></textarea>
                
                <button onclick="sendMessage()" class="p-2.5 mb-1 rounded-xl bg-blue-600 hover:bg-blue-500 text-white shadow-[0_4px_0_#1e40af] active:shadow-[0_0px_0_#1e40af] active:translate-y-1 transition-all duration-150 shrink-0 flex items-center justify-center group" aria-label="Send message">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 transition-transform duration-300 group-hover:-translate-y-0.5 group-hover:translate-x-0.5">
                        <path d="M3.478 2.404a.75.75 0 0 0-.926.941l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.404Z" />
                    </svg>
                </button>
            </div>
            <p class="text-center text-xs text-gray-400 mt-3">Smera can make mistakes. Consider verifying important information.</p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let rawSession = sessionStorage.getItem("chat_session_id");

let sessionId = rawSession ? parseInt(rawSession) : null;;

/* Layout & UI Toggles */
function toggleSidebar() {
    const sidebar = document.getElementById("chatSidebar");
    const overlay = document.getElementById("sidebarOverlay");
    const isMobile = window.innerWidth < 768;
    
    if (isMobile) {
        // Mobile behavior: Slide in/out and toggle overlay
        sidebar.classList.toggle("-translate-x-full");
        overlay.classList.toggle("hidden");
        
        // Ensure width is set for mobile when open
        if (!sidebar.classList.contains("-translate-x-full")) {
            sidebar.classList.remove("w-0", "border-none");
            sidebar.classList.add("w-72");
        }
    } else {
        // Desktop behavior: Collapse width to 0
        sidebar.classList.remove("-translate-x-full"); // Ensure it's not translated off-screen on desktop
        
        if (sidebar.classList.contains("w-72")) {
            sidebar.classList.remove("w-72");
            sidebar.classList.add("w-0", "border-none");
        } else {
            sidebar.classList.remove("w-0", "border-none");
            sidebar.classList.add("w-72");
        }
    }
}

// Initial setup to ensure sidebar is visible on desktop load
window.addEventListener('DOMContentLoaded', () => {
    if (window.innerWidth >= 768) {
        const sidebar = document.getElementById("chatSidebar");
        sidebar.classList.remove("-translate-x-full");
        sidebar.classList.add("md:relative"); // Add relative positioning for desktop
    }
});

// Handle resize events to reset sidebar state across breakpoints
window.addEventListener('resize', () => {
    const sidebar = document.getElementById("chatSidebar");
    const overlay = document.getElementById("sidebarOverlay");
    const isMobile = window.innerWidth < 768;

    if (!isMobile) {
        overlay.classList.add("hidden");
        sidebar.classList.remove("-translate-x-full");
        sidebar.classList.add("md:relative");
    } else {
        sidebar.classList.remove("md:relative");
        if (sidebar.classList.contains("w-0")) {
            // If it was collapsed on desktop, hide it on mobile
             sidebar.classList.add("-translate-x-full");
             sidebar.classList.remove("w-0", "border-none");
             sidebar.classList.add("w-72");
        }
    }
});

/* Auto-resize textarea */
const tx = document.getElementById("chatInput");
tx.setAttribute("style", "height:" + (tx.scrollHeight) + "px;overflow-y:hidden;");
tx.addEventListener("input", OnInput, false);

function OnInput() {
    this.style.height = "auto";
    this.style.height = (this.scrollHeight) + "px";
    if (this.value === "") { this.style.height = "48px"; }
}

/* Enter to send, Shift+Enter for new line */
document.getElementById("chatInput").addEventListener("keydown", function(e){
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

function goDashboard(){
    window.location.href = "/api/core/dashboard-page/";
}

/* Chat Operations */
async function initChat(){
    if (sessionId && !isNaN(sessionId)) return; 

    try {
        const {data} = await apiRequest("/api/core/chat/session/", "POST");

        sessionId = data.session_id;

        // 🔥 persist session
        sessionStorage.setItem("chat_session_id", sessionId);

    } catch (e) { 
        console.error("Session failed", e); 
    }
}

async function sendMessage(){
    const input = document.getElementById("chatInput");
    const msg = input.value.trim();
    if(!msg) return;

    // --- NEW: Remove the default greeting immediately when sending ---
    const greeting = document.getElementById("defaultGreeting");
    if (greeting) {
        greeting.remove();
    }
    // -------------------------------------------------------------

    if (!sessionId) await initChat();

    appendMessage("user", msg);
    input.value = "";
    input.style.height = "48px"; // reset height
    
    showTyping(true);

    try {
        const {data} = await apiRequest("/api/core/chat/message/", "POST", {
            session_id: sessionId,
            message: msg
        });
        if (data.reply) {
            appendMessage("bot", data.reply);
        } else {
            showDefaultGreeting();  // ✅ clean UI greeting
        }
        loadChatHistory();
    } catch (e) {
        appendMessage("bot", "I encountered an error connecting. Let's try that again.");
    } finally {
        showTyping(false);
    }
}

function showDefaultGreeting() {
    const box = document.getElementById("chatBox");
    box.innerHTML = `
        <div id="defaultGreeting" class="flex flex-col items-center justify-center h-full opacity-0 animate-[fadeIn_0.5s_ease-out_forwards] px-4">
            <!-- Large Avatar -->
            <svg width="120" height="120" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="Smera-float">
    
                <!-- Base Face -->
                <circle cx="50" cy="50" r="45" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="2"/>
                
                <!-- Animated Eyes -->
                <circle cx="35" cy="45" r="4" fill="#4F46E5" class="smera-eye eye-left"/>
                <circle cx="65" cy="45" r="4" fill="#4F46E5" class="smera-eye eye-right"/>
                
                <!-- Smile -->
                <path d="M40 65C40 65 45 70 50 70C55 70 60 65 60 65" stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>
                
                <!-- Animated Cheeks -->
                <circle cx="30" cy="55" r="5" fill="#FED7AA" class="smera-cheek cheek-left"/>
                <circle cx="70" cy="55" r="5" fill="#FED7AA" class="smera-cheek cheek-right"/>
            </svg>
            
            <!-- Greeting Text -->
            <h2 class="text-2xl md:text-3xl font-bold text-gray-800 dark:text-gray-100 mb-3 text-center tracking-tight">How can I help you today?</h2>
            <p class="text-gray-500 dark:text-gray-400 text-sm md:text-base mb-8 text-center max-w-md">I'm Smera. Feel free to share what's on your mind or explore some topics below.</p>
            
            <!-- Suggestion Chips -->
            <div class="flex flex-wrap justify-center gap-3 max-w-2xl">
                <button onclick="fillInput('I am feeling a bit stressed about my workload today.')" class="px-4 py-2.5 bg-white dark:bg-[#1e293b] border border-gray-200 dark:border-gray-700 rounded-xl text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                    Dealing with stress
                </button>
                <button onclick="fillInput('How can I improve my daily sleep schedule?')" class="px-4 py-2.5 bg-white dark:bg-[#1e293b] border border-gray-200 dark:border-gray-700 rounded-xl text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                    Better sleep habits
                </button>
                <button onclick="fillInput('I just need someone to talk to for a few minutes.')" class="px-4 py-2.5 bg-white dark:bg-[#1e293b] border border-gray-200 dark:border-gray-700 rounded-xl text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                    Just need to chat
                </button>
            </div>
        </div>
    `;
}

// Helper function for the suggestion chips
function fillInput(text) {
    const input = document.getElementById('chatInput');
    input.value = text;
    input.focus();
    // Trigger auto-resize logic so the input box expands if needed
    input.dispatchEvent(new Event('input'));
}

function appendMessage(role, text) {
    const box = document.getElementById("chatBox");
    const div = document.createElement("div");
    
    // Adjusted row padding for the new bubble design
    div.className = "w-full msg-animate flex justify-center py-4 px-4";

    // Smera's Avatar (with dark mode support)
    const SmeraIcon = `
        <div class="w-8 h-8 rounded-full border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 flex items-center justify-center shrink-0 mt-1 overflow-hidden shadow-sm">
            <svg width="100%" height="100%" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" class="fill-gray-100"/>
                <circle cx="35" cy="45" r="4" class="fill-blue-600"/>
                <circle cx="65" cy="45" r="4" class="fill-blue-600"/>
                <path d="M40 65C40 65 45 70 50 70C55 70 60 65 60 65" class="stroke-blue-600 dark:stroke-blue-400" stroke-width="3" stroke-linecap="round"/>
            </svg>
        </div>
    `;

    // Format text to handle basic line breaks
    const formattedText = text.replace(/\n/g, '<br>');

    if (role === "user") {
        div.innerHTML = `
            <div class="max-w-4xl w-full flex justify-end">
                <!-- 3D Ocean Blue User Bubble -->
                <div class="bg-blue-500 dark:bg-blue-600 border border-blue-400 dark:border-blue-500 text-white px-5 py-3.5 rounded-2xl rounded-tr-sm max-w-[80%] text-[15px] leading-relaxed shadow-[0_4px_0_#1d4ed8] dark:shadow-[0_4px_0_#1e3a8a] relative overflow-hidden group transform transition-transform hover:-translate-y-0.5">
                    
                    <!-- Subtle top highlight for the 3D bevel effect -->
                    <div class="absolute top-0 left-0 right-0 h-1 bg-white opacity-20 group-hover:opacity-30 transition-opacity"></div>
                    
                    ${formattedText}
                </div>
            </div>
        `;
    } else {
        div.innerHTML = `
            <div class="max-w-4xl w-full flex gap-4 md:gap-6">
                ${SmeraIcon}
                <!-- 3D Warm Cream/Deep Amber Bot Bubble -->
                <div class="bg-yellow-100 dark:bg-yellow-900 border border-yellow-200 dark:border-yellow-700/50 text-yellow-950 dark:text-yellow-50 font-medium px-5 py-3.5 rounded-2xl rounded-tl-sm max-w-[80%] text-[15px] leading-relaxed shadow-[0_4px_0_#ca8a04] dark:shadow-[0_4px_0_#713f12] relative overflow-hidden group transform transition-transform hover:-translate-y-0.5 mt-1">
                    
                    <!-- Subtle top highlight -->
                    <div class="absolute top-0 left-0 right-0 h-1 bg-white opacity-40 dark:opacity-10 group-hover:opacity-50 dark:group-hover:opacity-20 transition-opacity"></div>
                    
                    ${formattedText}
                </div>
            </div>
        `;
    }

    box.appendChild(div);
    scrollToBottom();
}

function showTyping(show) {
    const indicator = document.getElementById("typingIndicator");
    show ? indicator.classList.remove("hidden") : indicator.classList.add("hidden");
    scrollToBottom();
}

function scrollToBottom() {
    const box = document.getElementById("chatBox");
    box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
}

/* History Sidebar Functions */
function renderChatItem(chat) {
    const activeClass = chat.id === sessionId ? "bg-gray-200 dark:bg-gray-800" : "hover:bg-gray-100 dark:hover:bg-gray-800";
    
    // Pin styling logic
    const pinColor = chat.is_pinned ? "text-yellow-500" : "text-gray-400 hover:text-yellow-500";
    const pinIcon = chat.is_pinned ? "fill-current" : "fill-none stroke-current stroke-2";

    return `
        <div data-session-id="${chat.id}" class="chat-item group flex items-center justify-between gap-2 px-3 py-2.5 rounded-lg cursor-pointer transition-colors ${activeClass}" onclick="switchSession(${chat.id})">
            
            <div class="flex-1 min-w-0 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                </svg>
                <span class="truncate text-[13px] font-medium text-gray-700 dark:text-gray-300 chat-title">${chat.title || "New Chat"}</span>
            </div>

            <!-- Hover Action Buttons -->
            <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                <!-- Pin Button -->
                <button onclick="togglePin(event, ${chat.id})" class="${pinColor} transition-colors p-1" title="Pin Chat">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ${pinIcon}" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" />
                    </svg>
                </button>
                <!-- Delete Button -->
                <button onclick="deleteChat(event, ${chat.id})" class="text-gray-400 hover:text-red-500 transition-colors p-1" title="Delete Chat">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </button>
            </div>
        </div>
    `;
}

async function togglePin(event, chatId) {
    // Prevent the click from bubbling up and switching the active session
    event.stopPropagation(); 
    try {
        await apiRequest(`/api/core/chat/session/${chatId}/pin/`, "POST");
        // Reloading history will automatically sort pinned items to the top based on your backend view
        loadChatHistory(); 
    } catch (e) {
        console.error("Pin failed", e);
    }
}

async function loadChatHistory(){
    try {
        const {data} = await apiRequest("/api/core/chat/sessions/", "GET");
        const container = document.getElementById("chatHistorySidebar");
        container.innerHTML = "";
        data.forEach(session => {
            container.innerHTML += renderChatItem(session);
        });
    } catch (e) {
        console.error("History load failed", e);
    }
}

async function switchSession(id){
    sessionId = id;
    sessionStorage.setItem("chat_session_id", id);
    try {
        const {data} = await apiRequest(`/api/core/chat/session/${id}/`, "GET");
        const box = document.getElementById("chatBox");
        box.innerHTML = "";
        data.forEach(msg => { appendMessage(msg.role, msg.content); });
    } catch (e) {
        console.error("Failed to switch session", e);
    }
    loadChatHistory(); // Refreshes active state
    if (window.innerWidth < 768) toggleSidebar(); 
}

function searchChats() {
    const query = document.getElementById("chatSearchInput").value.toLowerCase();
    const items = document.querySelectorAll(".chat-item");
    items.forEach(item => {
        const title = item.querySelector(".chat-title").innerText.toLowerCase();
        item.style.display = title.includes(query) ? "flex" : "none";
    });
}

function createNewChat(){
    sessionId = null;
    document.getElementById("chatBox").innerHTML = "";
    loadInitialMessage(); // Inject the welcome screen
    
    // Deselect any active chat in the sidebar
    document.querySelectorAll(".chat-item").forEach(el => {
        el.classList.remove("bg-gray-200", "dark:bg-gray-800");
        el.classList.add("hover:bg-gray-100", "dark:hover:bg-gray-800");
    });

    if (window.innerWidth < 768) toggleSidebar();
}

async function deleteChat(event, chatId) {
    event.stopPropagation();
    if (!confirm("Delete this conversation?")) return;
    try {
        await apiRequest(`/api/core/chat/session/${chatId}/delete/`, "DELETE");
        if (sessionId === chatId) {
            document.getElementById("chatBox").innerHTML = "";
            sessionId = null;
        }
        loadChatHistory();
    } catch (e) {
        console.error("Delete failed", e);
    }
}
async function loadInitialMessage() {
    try {
        // 🚫 HARD STOP: no invalid calls
        if (!sessionId || isNaN(sessionId)) {
            showDefaultGreeting();
            return;
        }

        const { data } = await apiRequest(
            `/api/core/chat/initial/?session_id=${sessionId}`,
            "GET",
            null,
            { silent: true }
        );

        const box = document.getElementById("chatBox");

        if (box.children.length === 0 && data?.reply) {
            appendMessage("bot", data.reply);
        }

    } catch (e) {
        console.error("Initial message failed", e);
        showDefaultGreeting();
    }
}
async function initPage() {
    await loadChatHistory();

    if (sessionId && !isNaN(sessionId)) {
        await loadInitialMessage();

      
    } else {
        showDefaultGreeting();
    }
}

initPage();
</script>
{% endblock %}
