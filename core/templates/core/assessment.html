{% extends "base.html" %}
{% load i18n static %}

{% block title %}Assessment{% endblock %}

{% block content %}

<div class="max-w-3xl mx-auto">
    <div id="app" class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl shadow-sm overflow-hidden transition-all duration-300">
        </div>
</div>

{% endblock %}

{% block extra_js %}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const app = document.getElementById("app");

/* ---------- QUESTIONS ---------- */
const QUESTIONS = {
    phq9: [
        "Little interest or pleasure in doing things?",
        "Feeling down, depressed, or hopeless?",
        "Trouble sleeping?",
        "Feeling tired or low energy?",
        "Poor appetite or overeating?",
        "Feeling bad about yourself?",
        "Trouble concentrating?",
        "Moving/speaking slowly or restlessness?",
        "Thoughts of self-harm?"
    ],
    gad7: [
        "Feeling nervous or anxious?",
        "Not being able to stop worrying?",
        "Worrying too much?",
        "Trouble relaxing?",
        "Restlessness?",
        "Easily annoyed?",
        "Feeling afraid?"
    ]
};

const OPTIONS = [
    {label: "Not at all", value: 0},
    {label: "Several days", value: 1},
    {label: "More than half the days", value: 2},
    {label: "Nearly every day", value: 3}
];

/* ---------- STATE ---------- */
let state = {
    step: 0,
    type: null,
    index: 0,
    answers: [],
    results: {
        phq9: null,
        gad7: null
    }
};

/* ---------- DESIGN SYSTEM CLASSES ---------- */
const BTN_PRIMARY = 
    "bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl shadow-lg shadow-blue-500/30 transition-all active:scale-95";

const BTN_SECONDARY = 
    "bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 font-semibold py-3 px-6 rounded-xl transition-all hover:bg-gray-50 dark:hover:bg-gray-600 active:scale-95 shadow-sm text-gray-900 dark:text-gray-100";

const OPTION =
    "w-full p-4 mb-3 border border-gray-200 dark:border-gray-700 rounded-xl text-left transition-all bg-gray-50 dark:bg-gray-900/50 hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300 font-medium cursor-pointer";

const OPTION_SELECTED =
    "border-blue-600 bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-400 scale-[1.02] shadow-sm";

/* ---------- ROUTER ---------- */
function render(){
    window.scrollTo({ top: 0, behavior: 'smooth' });
    switch(state.step){
        case 0: return renderWelcome();
        case 1: return renderSelect();
        case 2: return renderIntro();
        case 3: return renderQuestion();
        case 4: return renderReview();
        case 5: return renderResult();
    }
}

/* ---------- STEP 0 ---------- */
function renderWelcome(){
    app.innerHTML = `
        <div class="p-8 md:p-12 text-center space-y-6">
            <div class="mx-auto w-16 h-16 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-full flex items-center justify-center mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-black dark:text-white">Mental Health Check</h1>
            <p class="text-gray-500 dark:text-gray-400 max-w-md mx-auto">Take a few minutes to check in with yourself. This brief assessment helps track your mood and anxiety levels.</p>
            <div class="pt-4">
                <button onclick="nextStep()" class="${BTN_PRIMARY} w-full sm:w-auto sm:px-12">Start Assessment</button>
            </div>
        </div>
    `;
}

/* ---------- STEP 1 ---------- */
function renderSelect(){
    app.innerHTML = `
        <div class="p-6 md:p-8 space-y-6">
            <header class="text-center mb-8 border-b border-gray-100 dark:border-gray-700 pb-6">
                <h2 class="text-2xl font-bold tracking-tight text-black dark:text-white">Choose Assessment</h2>
                <p class="text-gray-500 dark:text-gray-400 mt-2">Select the questionnaire you'd like to complete.</p>
            </header>
            
            <div class="grid gap-4 max-w-md mx-auto">
                <button onclick="selectType('phq9')" class="${OPTION} hover:border-blue-500 group flex items-center justify-between">
                    <span class="font-semibold text-lg">PHQ-9</span>
                    <span class="text-sm text-gray-500 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">Depression Check &rarr;</span>
                </button>

                <button onclick="selectType('gad7')" class="${OPTION} hover:border-blue-500 group flex items-center justify-between">
                    <span class="font-semibold text-lg">GAD-7</span>
                    <span class="text-sm text-gray-500 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">Anxiety Check &rarr;</span>
                </button>
            </div>
        </div>
    `;
}

function selectType(type){
    state.type = type;
    nextStep();
}

/* ---------- STEP 2 ---------- */
function renderIntro(){
    app.innerHTML = `
        <div class="p-6 md:p-8 text-center space-y-6">
            <h2 class="text-2xl font-bold tracking-tight uppercase text-black dark:text-white">${state.type}</h2>
            
            <div class="bg-blue-50 dark:bg-blue-900/20 text-blue-800 dark:text-blue-300 p-5 rounded-xl max-w-md mx-auto text-sm border border-blue-100 dark:border-blue-800/50">
                <p class="font-semibold mb-1">Instruction:</p>
                <p>Over the last 2 weeks, how often have you been bothered by the following problems?</p>
            </div>

            <div class="pt-4">
                <button onclick="nextStep()" class="${BTN_PRIMARY} w-full sm:w-auto sm:px-12">Begin Questionnaire</button>
            </div>
        </div>
    `;
}

/* ---------- STEP 3 ---------- */
function renderQuestion(){
    const totalQ = QUESTIONS[state.type].length;
    const currentQ = state.index + 1;
    const progress = Math.round((state.index / totalQ) * 100);
    const q = QUESTIONS[state.type][state.index];
    const selected = state.answers[state.index];

    app.innerHTML = `
        <div class="p-6 md:p-8 space-y-6">
            
            <div class="flex justify-between items-center mb-2">
                <span class="text-sm font-semibold uppercase tracking-wider text-blue-600 dark:text-blue-400">Question ${currentQ} of ${totalQ}</span>
                <span class="text-xs font-medium text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded-full">${progress}% Complete</span>
            </div>
            
            <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2 mb-6 overflow-hidden">
                <div class="bg-blue-600 h-2 rounded-full transition-all duration-500 ease-out" style="width: ${progress}%"></div>
            </div>

            <h3 class="text-xl md:text-2xl font-semibold mb-6 text-gray-900 dark:text-white leading-relaxed">
                ${q}
            </h3>

            <div class="space-y-3">
                ${OPTIONS.map(o => `
                    <button onclick="answer(${o.value})"
                        class="${OPTION} ${selected === o.value ? OPTION_SELECTED : ''}">
                        <div class="flex items-center gap-3">
                            <div class="w-5 h-5 rounded-full border-2 flex items-center justify-center transition-colors ${selected === o.value ? 'border-blue-600' : 'border-gray-400 dark:border-gray-500'}">
                                ${selected === o.value ? '<div class="w-2.5 h-2.5 bg-blue-600 rounded-full"></div>' : ''}
                            </div>
                            ${o.label}
                        </div>
                    </button>
                `).join("")}
            </div>

            <div class="pt-6 border-t border-gray-100 dark:border-gray-700 mt-6 flex justify-between items-center">
                <button onclick="prevQuestion()" class="text-gray-500 hover:text-gray-900 dark:hover:text-white font-medium text-sm transition-colors ${state.index === 0 ? 'invisible' : ''}">
                    &larr; Previous
                </button>
                
                <button onclick="nextQuestion()" class="${BTN_PRIMARY} px-8">
                    ${state.index === totalQ - 1 ? 'Review Answers' : 'Next'}
                </button>
            </div>
        </div>
    `;
}

function answer(val){
    state.answers[state.index] = val;
    renderQuestion(); // Re-render to show selection instantly
}

function prevQuestion() {
    if (state.index > 0) {
        state.index--;
        render();
    }
}

function nextQuestion(){
    if(state.answers[state.index] === undefined){
        if(typeof showToast === 'function') showToast("error", "Please select an option to continue.");
        else alert("Please select an option");
        return;
    }

    state.index++;

    if(state.index >= QUESTIONS[state.type].length){
        state.step = 4;
    }

    render();
}

/* ---------- STEP 4 ---------- */
function renderReview(){
    app.innerHTML = `
        <div class="p-6 md:p-8 space-y-6">
            <header class="mb-6 border-b border-gray-100 dark:border-gray-700 pb-4 text-center sm:text-left">
                <h2 class="text-2xl font-bold tracking-tight text-black dark:text-white">Review Your Answers</h2>
                <p class="text-gray-500 dark:text-gray-400 mt-1">Please review your responses before submitting.</p>
            </header>

            <div class="space-y-3 max-h-[50vh] overflow-y-auto pr-2 custom-scrollbar">
                ${state.answers.map((a,i)=>`
                    <div class="p-4 bg-gray-50 dark:bg-gray-900/50 border border-gray-200 dark:border-gray-700 rounded-xl flex flex-col gap-1 hover:border-gray-300 dark:hover:border-gray-600 transition-colors">
                        <p class="text-sm font-medium text-gray-900 dark:text-gray-100">
                            <span class="text-blue-600 dark:text-blue-400 mr-1">Q${i+1}.</span> ${QUESTIONS[state.type][i]}
                        </p>
                        <p class="text-sm text-gray-600 dark:text-gray-400 pl-6 border-l-2 border-gray-200 dark:border-gray-700 ml-1 mt-1">
                            ${OPTIONS.find(opt => opt.value === a).label}
                        </p>
                    </div>
                `).join("")}
            </div>

            <div class="pt-6 border-t border-gray-100 dark:border-gray-700 flex flex-col-reverse sm:flex-row gap-3 sm:justify-end">
                <button onclick="state.step = 3; state.index = 0; render();" class="${BTN_SECONDARY} w-full sm:w-auto">Edit Answers</button>
                <button onclick="submitAssessment()" class="${BTN_PRIMARY} w-full sm:w-auto">Submit Assessment</button>
            </div>
        </div>
    `;
}

/* ---------- STEP 5 ---------- */
function renderResult(){
    app.innerHTML = `
        <div class="p-8 md:p-12 text-center space-y-6">
            <div class="mx-auto w-16 h-16 bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-full flex items-center justify-center mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            
            <h2 class="text-2xl font-bold tracking-tight text-black dark:text-white">Assessment Complete</h2>
            <p class="text-gray-500 dark:text-gray-400 max-w-md mx-auto">Your responses have been securely saved and analyzed.</p>
            
            <div class="flex flex-col gap-3 max-w-sm mx-auto pt-6">
                <button onclick="renderReport()" class="${BTN_PRIMARY}">View Full Report</button>
                <button onclick="goChatbot()" class="${BTN_SECONDARY}">
                    Chat with Chatbot
                </button>
                ${state.type === "phq9" && !state.results.gad7 
                    ? `<button onclick="startNext('gad7')" class="${BTN_SECONDARY} border-blue-200 dark:border-blue-900 text-blue-700 dark:text-blue-400">Continue with GAD-7</button>` 
                    : ''}

                ${state.type === "gad7" && !state.results.phq9 
                    ? `<button onclick="startNext('phq9')" class="${BTN_SECONDARY} border-blue-200 dark:border-blue-900 text-blue-700 dark:text-blue-400">Continue with PHQ-9</button>` 
                    : ''}    
                
                <button onclick="goDashboard()" class="${BTN_SECONDARY}">Return to Dashboard</button>
            </div>
        </div>
    `;
}

/* ---------- REPORT ---------- */
let reportChart = null;

function renderReport(){
    const phq = state.results.phq9;
    const gad = state.results.gad7;

    app.innerHTML = `
        <div class="p-6 md:p-8 space-y-8">
            <header class="border-b border-gray-100 dark:border-gray-700 pb-4">
                <h2 class="text-2xl font-bold tracking-tight text-black dark:text-white">Mental Health Report</h2>
                <p class="text-gray-500 dark:text-gray-400 mt-1">Analysis based on your recent assessment.</p>
            </header>

            <div class="bg-gray-50 dark:bg-gray-900/50 p-4 rounded-xl border border-gray-200 dark:border-gray-700">
                <canvas id="chart" height="200"></canvas>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                ${phq ? `
                <div class="p-4 border border-gray-200 dark:border-gray-700 rounded-xl">
                    <p class="text-sm text-gray-500 dark:text-gray-400 font-medium mb-1">Depression (PHQ-9)</p>
                    <p class="text-lg font-bold capitalize text-gray-900 dark:text-white">${phq.risk_level}</p>
                </div>` : ""}
                
                ${gad ? `
                <div class="p-4 border border-gray-200 dark:border-gray-700 rounded-xl">
                    <p class="text-sm text-gray-500 dark:text-gray-400 font-medium mb-1">Anxiety (GAD-7)</p>
                    <p class="text-lg font-bold capitalize text-gray-900 dark:text-white">${gad.risk_level}</p>
                </div>` : ""}
            </div>

            <div class="space-y-6">
                <div>
                    <h3 class="text-sm font-semibold uppercase tracking-wider text-blue-600 dark:text-blue-400 mb-3">Key Insights</h3>
                    <ul class="space-y-2 text-gray-700 dark:text-gray-300 text-sm">
                        ${generateInsights(phq, gad)}
                    </ul>
                </div>

                <div>
                    <h3 class="text-sm font-semibold uppercase tracking-wider text-green-600 dark:text-green-400 mb-3">Recommendations</h3>
                    <ul class="space-y-2 text-gray-700 dark:text-gray-300 text-sm">
                        ${generateRecommendations(phq, gad)}
                    </ul>
                </div>
            </div>
            <div>
                <h3 class="text-sm font-semibold uppercase tracking-wider text-indigo-600 dark:text-indigo-400 mb-3">
                    AI Insight
                </h3>
                <p id="aiInsight" class="text-gray-700 dark:text-gray-300 text-sm">
                    Generating insight...
                </p>
            </div>
            <div class="pt-6 border-t border-gray-100 dark:border-gray-700">
                <button onclick="goDashboard()" class="${BTN_SECONDARY} w-full sm:w-auto">
                    Back to Dashboard
                </button>
            </div>
        </div>
    `;

    renderChart(phq, gad);
    initAIInsight();
}

function renderChart(phq, gad){
    const ctx = document.getElementById("chart");
    if(reportChart) reportChart.destroy();

    // Check for dark mode to set text color properly
    const isDark = document.documentElement.classList.contains('dark');
    const textColor = isDark ? '#9ca3af' : '#4b5563'; 
    const gridColor = isDark ? '#374151' : '#e5e7eb';

    reportChart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: ["Depression Score", "Anxiety Score"],
            datasets: [{
                label: "Score",
                data: [
                    phq ? phq.score : 0,
                    gad ? gad.score : 0
                ],
                backgroundColor: [
                    'rgba(59, 130, 246, 0.8)', // blue-500
                    'rgba(16, 185, 129, 0.8)'  // emerald-500
                ],
                borderRadius: 6
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    max: 27, // Max score for both PHQ9 and GAD7
                    ticks: { color: textColor },
                    grid: { color: gridColor }
                },
                x: {
                    ticks: { color: textColor },
                    grid: { display: false }
                }
            }
        }
    });
}

/* ---------- INSIGHTS ---------- */
function generateInsights(phq, gad){
    let out = "";
    const liClass = "flex items-start gap-2 before:content-['•'] before:text-blue-500";

    if(phq && phq.risk_level !== "minimal"){
        out += `<li class="${liClass}">Elevated depressive symptoms detected.</li>`;
    }
    if(gad && gad.risk_level !== "minimal"){
        out += `<li class="${liClass}">Elevated anxiety levels detected.</li>`;
    }
    if(phq && gad){
        out += `<li class="${liClass}">Possible overlap between mood and anxiety patterns.</li>`;
    }
    if (out === "") {
        out += `<li class="${liClass}">Your scores indicate minimal to no significant symptoms currently.</li>`;
    }
    return out;
}

/* ---------- RECOMMENDATIONS ---------- */
function generateRecommendations(phq, gad){
    const liClass = "flex items-start gap-2 before:content-['✓'] before:text-green-500 before:font-bold";
    return `
        <li class="${liClass}">Maintain consistent sleep schedule to support mood regulation.</li>
        <li class="${liClass}">Engage in light physical activity for at least 20 minutes daily.</li>
        <li class="${liClass}">Practice breathing or grounding techniques when feeling overwhelmed.</li>
        <li class="${liClass}">Consider speaking to a professional if symptoms persist or disrupt daily life.</li>
    `;
}

/* ---------- API ---------- */
async function submitAssessment(){
    // Show a basic loader state on the button if possible, but keeping it simple for now
    const { res, data } = await apiRequest(
        "/api/core/assessment/",
        "POST",
        {
            type: state.type,
            answers: state.answers
        }
    );

    if (res && res.ok) {
        state.results[state.type] = data.data;
        state.step = 5;
        render();
    } else {
        if(typeof showToast === 'function') showToast("error", "Failed to submit assessment.");
        else alert("Failed to submit assessment.");
    }
}

/* ---------- NAV ---------- */
function startNext(type){
    state.type = type;
    state.index = 0;
    state.answers = [];
    state.step = 2;
    render();
}

function nextStep(){
    state.step++;
    render();
}

function goDashboard(){
    window.location.href = "/api/core/dashboard-page/";
}
function goChatbot(){
    window.location.href = "/api/core/chatbot-page/";
}
async function initAIInsight(){
    try {
        // 1. Create session
        const sessionRes = await apiRequest(
            "/api/core/chat/session/",
            "POST"
        );

        const sessionId = sessionRes.data.session_id;

        // 2. Build context message using scores
        const phq = state.results.phq9;
        const gad = state.results.gad7;

        const message = `
User completed assessment.
PHQ: ${phq ? phq.risk_level : "N/A"}
GAD: ${gad ? gad.risk_level : "N/A"}

Give a short mental health insight.
        `;

        // 3. Call chatbot
        const {data} = await apiRequest(
            "/api/core/chat/message/",
            "POST",
            {
                session_id: sessionId,
                message: message
            }
        );

        // 4. Inject into UI
        document.getElementById("aiInsight").innerText = data.reply;

    } catch (err){
        document.getElementById("aiInsight").innerText =
            "Unable to generate insight right now.";
    }
}
// Initial Render
render();
</script>

{% endblock %}
