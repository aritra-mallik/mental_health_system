{% extends "base.html" %}
{% load i18n static %}

{% block title %}Mental Health Assessment{% endblock %}

{% block content %}
<style>
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
        animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .glass-panel {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
    }
    .dark .glass-panel {
        background: rgba(30, 41, 59, 0.95);
    }
    .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: rgba(156, 163, 175, 0.5);
        border-radius: 20px;
    }
</style>

<div class="max-w-3xl mx-auto py-8 px-4 sm:px-6 lg:px-8 min-h-[85vh] flex items-center">
    <div id="app" class="w-full glass-panel border border-gray-200/60 dark:border-slate-700/60 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.05)] dark:shadow-[0_20px_50px_rgba(0,0,0,0.4)] overflow-hidden transition-all duration-500 relative min-h-[500px] flex flex-col">
        </div>
</div>

{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const app = document.getElementById("app");

/* =========================
   QUESTION BANKS & DATA
========================= */
const QUESTIONS = {
    who5: [
        "I have felt cheerful and in good spirits",
        "I have felt calm and relaxed",
        "I have felt active and vigorous",
        "I woke up feeling fresh and rested",
        "My daily life has been filled with things that interest me"
    ],
    pss: [
        "Upset because of something unexpected?",
        "Unable to control important things?",
        "Felt nervous and stressed?",
        "Felt confident handling problems?",
        "Things going your way?",
        "Could not cope with tasks?",
        "Controlled irritations?",
        "Felt on top of things?",
        "Angered by things outside control?",
        "Difficulties piling up?"
    ],
    dass21: [
        "Hard to wind down", "Dryness of mouth", "No positive feeling",
        "Breathing difficulty", "Hard to initiate tasks", "Over-reacting",
        "Trembling", "Using nervous energy", "Fear of panic",
        "Nothing to look forward to", "Agitated", "Hard to relax",
        "Down-hearted", "Intolerant", "Close to panic",
        "No enthusiasm", "Low self-worth", "Touchy",
        "Heart awareness", "Unexplained fear", "Life meaningless"
    ],
    isi: [
        "Difficulty falling asleep",
        "Difficulty staying asleep",
        "Waking too early",
        "Satisfaction with sleep",
        "Sleep noticeable to others",
        "Distress about sleep",
        "Interference with daily functioning"
    ],
    burnout: [
        "Emotionally drained",
        "Used up at end of day",
        "Fatigued in morning",
        "Burned out",
        "Frustrated",
        "Working too hard",
        "Emotionally exhausted",
        "At the end of rope",
        "Detached",
        "Less motivated"
    ]
};

const OPTIONS_MAP = {
    who5: [
        {label:"At no time", value:0}, {label:"Some of the time", value:1},
        {label:"Less than half", value:2}, {label:"More than half", value:3},
        {label:"Most of the time", value:4}, {label:"All the time", value:5}
    ],
    pss: [
        {label:"Never", value:0}, {label:"Almost never", value:1},
        {label:"Sometimes", value:2}, {label:"Fairly often", value:3},
        {label:"Very often", value:4}
    ],
    dass21: [
        {label:"Not at all", value:0}, {label:"Some degree", value:1},
        {label:"Considerable", value:2}, {label:"Very much", value:3}
    ],
    isi: [
        {label:"None", value:0}, {label:"Mild", value:1},
        {label:"Moderate", value:2}, {label:"Severe", value:3},
        {label:"Very severe", value:4}
    ],
    burnout: [
        {label:"Never", value:0}, {label:"Rarely", value:1},
        {label:"Sometimes", value:2}, {label:"Often", value:3},
        {label:"Always", value:4}
    ]
};

const TITLES = {
    who5: "Well-Being Index (WHO-5)",
    pss: "Perceived Stress Scale",
    dass21: "DASS-21 Check",
    isi: "Insomnia Severity Index",
    burnout: "Burnout Assessment"
};

const INSTRUCTIONS = {
    who5: "Reflect on how you have been feeling over the last 2 weeks.",
    pss: "Consider your thoughts and feelings over the last month.",
    dass21: "Focus on your experiences over the past week.",
    isi: "Think about your sleep patterns over the last 2 weeks.",
    burnout: "Reflect on your work and life balance over the last month."
};

/* =========================
   STATE
========================= */
let state = {
    step: 0,
    type: null,
    index: 0,
    answers: [],
    results: {}
};

/* =========================
   DESIGN CLASSES
========================= */
const BTN_PRIMARY = "bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 px-8 rounded-2xl shadow-lg shadow-indigo-500/30 transition-all active:scale-95 flex justify-center items-center gap-2";
const BTN_SECONDARY = "bg-white dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 font-bold py-3.5 px-8 rounded-2xl transition-all hover:bg-slate-50 dark:hover:bg-slate-700 active:scale-95 text-slate-700 dark:text-slate-200 flex justify-center items-center gap-2";
const OPTION_CARD = "w-full p-5 mb-3 border-2 border-slate-100 dark:border-slate-700/50 rounded-2xl text-left transition-all bg-white dark:bg-slate-800/50 hover:border-indigo-200 dark:hover:border-indigo-500/50 text-slate-700 dark:text-slate-200 font-medium cursor-pointer group";
const OPTION_SELECTED = "border-indigo-600 dark:border-indigo-500 bg-indigo-50/50 dark:bg-indigo-900/20 text-indigo-800 dark:text-indigo-300 scale-[1.01] shadow-md";

/* =========================
   ROUTER
========================= */
function nextStep() {
    state.step++;
    render();
}

function render() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    app.innerHTML = ''; 
    setTimeout(() => {
        switch(state.step) {
            case 0: return renderWelcome();
            case 1: return renderSelect();
            case 2: return renderIntro();
            case 3: return renderQuestion(true); // Pass true to animate on first load
            case 4: return renderReview();
            case 5: return renderResult();
            case 6: return renderReport();
        }
    }, 10);
}
/* =========================
   UI COMPONENTS
========================= */
function renderWelcome() {
    app.innerHTML = `
        <div class="flex-grow flex flex-col items-center justify-center p-10 md:p-16 text-center animate-fade-in">
            <div class="w-20 h-20 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 rounded-3xl flex items-center justify-center mb-8 shadow-inner transform -rotate-3 border border-indigo-100 dark:border-indigo-800/50">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <h1 class="text-4xl md:text-5xl font-black text-slate-900 dark:text-white tracking-tight mb-4">Mental Health Check</h1>
            <p class="text-slate-500 dark:text-slate-400 mb-10 max-w-sm mx-auto text-lg leading-relaxed">Take a mindful moment to reflect on your current well-being and track your progress.</p>
            
            <div class="flex flex-col gap-5 items-center w-full sm:w-auto">
                <button onclick="nextStep()" class="${BTN_PRIMARY} w-full hover:shadow-indigo-500/50 hover:-translate-y-1">
                    <span>Begin Assessment</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
                
                <button onclick="window.location.href='/api/core/dashboard-page/'" class="group flex items-center gap-2 text-lg font-bold text-slate-400 hover:text-amber-500 transition-colors">
                    <svg class="w-4 h-4 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Return to Dashboard
                </button>
            </div>
        </div>`;
}

function renderSelect() {
    app.innerHTML = `
        <div class="p-8 md:p-12 flex-grow flex flex-col animate-fade-in">
            <header class="text-center mb-10">
                <h2 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Choose an Area</h2>
                <p class="text-slate-500 dark:text-slate-400 mt-2">Select the assessment that best aligns with your current focus.</p>
            </header>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 max-w-2xl mx-auto w-full">
                ${Object.keys(QUESTIONS).map(t => `
                    <button onclick="selectType('${t}')" class="group relative p-6 border-2 border-slate-100 dark:border-slate-700 bg-white dark:bg-slate-800 rounded-2xl text-left transition-all hover:border-indigo-600 dark:hover:border-indigo-400 hover:shadow-lg overflow-hidden flex flex-col justify-between h-full min-h-[120px]">
                        <div class="absolute inset-0 bg-gradient-to-br from-indigo-50 to-transparent dark:from-indigo-900/20 dark:to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <div class="relative z-10">
                            <span class="block font-bold text-lg text-slate-800 dark:text-slate-100 mb-1">${TITLES[t]}</span>
                            <span class="text-sm font-medium text-slate-500 dark:text-slate-400 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">Start Check-in &rarr;</span>
                        </div>
                    </button>
                `).join("")}
            </div>
        </div>`;
}

function selectType(type) {
    state.type = type;
    state.index = 0;
    state.answers = [];
    nextStep();
}

function renderIntro() {
    app.innerHTML = `
        <div class="flex-grow flex flex-col items-center justify-center p-10 md:p-16 text-center animate-fade-in">
            <div class="inline-flex items-center justify-center px-5 py-2 mb-8 text-sm font-bold tracking-widest text-indigo-700 bg-indigo-50 dark:bg-indigo-900/30 dark:text-indigo-300 rounded-full border border-indigo-100 dark:border-indigo-800/50 uppercase">
                ${TITLES[state.type]}
            </div>
            <h2 class="text-3xl md:text-4xl font-black text-slate-900 dark:text-white mb-6 leading-tight max-w-xl">${INSTRUCTIONS[state.type]}</h2>
            <p class="text-slate-500 dark:text-slate-400 mb-12 max-w-md text-lg">Answer based on your genuine feelings. There are no right or wrong answers here.</p>
            <button onclick="nextStep()" class="${BTN_PRIMARY} w-full sm:w-auto hover:shadow-indigo-500/50 hover:-translate-y-1">
                I'm Ready to Begin
            </button>
        </div>`;
}

function renderQuestion(animate = true) {
    const totalQ = QUESTIONS[state.type].length;
    const q = QUESTIONS[state.type][state.index];
    const opts = OPTIONS_MAP[state.type];
    const progress = (state.index / totalQ) * 100;
    const selected = state.answers[state.index];

    // Conditionally apply the fade-in animation to prevent flicker
    const animationClass = animate ? "animate-fade-in" : "";

    app.innerHTML = `
        <div class="w-full h-2 bg-slate-100 dark:bg-slate-800 absolute top-0 left-0">
            <div class="h-full bg-indigo-600 transition-all duration-500 ease-out rounded-r-full" style="width: ${progress}%"></div>
        </div>
        
        <div class="p-8 md:p-12 flex-grow flex flex-col ${animationClass} pt-12">
            <div class="flex justify-between items-center mb-8">
                <span class="text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500">Question ${state.index + 1} of ${totalQ}</span>
                <span class="text-xs font-bold text-indigo-600 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-900/30 px-3 py-1 rounded-full border border-indigo-100 dark:border-indigo-800/50">${Math.round(progress)}% Complete</span>
            </div>
            
            <h3 class="text-2xl md:text-3xl font-bold text-slate-900 dark:text-white mb-10 leading-snug">${q}</h3>

            <div class="space-y-1 mt-auto">
                ${opts.map(o => `
                    <button onclick="answer(${o.value})" class="${OPTION_CARD} ${selected === o.value ? OPTION_SELECTED : ''}">
                        <div class="flex items-center justify-between">
                            <span>${o.label}</span>
                            <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center transition-colors ${selected === o.value ? 'border-indigo-600' : 'border-slate-300 dark:border-slate-600 group-hover:border-indigo-400'}">
                                <div class="w-3 h-3 rounded-full bg-indigo-600 transition-transform duration-200 ${selected === o.value ? 'scale-100' : 'scale-0'}"></div>
                            </div>
                        </div>
                    </button>
                `).join("")}
            </div>

            <div class="pt-8 mt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800">
                <button onclick="prevQuestion()" class="text-slate-500 hover:text-slate-900 dark:hover:text-white font-bold text-sm transition-colors flex items-center gap-2 ${state.index === 0 ? 'invisible' : ''}">
                    &larr; Previous
                </button>
                <button onclick="nextQuestion()" class="${BTN_PRIMARY} px-10">
                    ${state.index === totalQ - 1 ? 'Review' : 'Next'}
                </button>
            </div>
        </div>`;
}

function answer(val) {
    state.answers[state.index] = val;
    renderQuestion(false); 
}

function prevQuestion() {
    if (state.index > 0) {
        state.index--;
        render();
    }
}

function nextQuestion() {
    if (state.answers[state.index] === undefined) {
        alert("Please select an option to continue.");
        return;
    }
    state.index++;
    if (state.index >= QUESTIONS[state.type].length) {
        state.step = 4;
    }
    render();
}

function renderReview() {
    const opts = OPTIONS_MAP[state.type];

    app.innerHTML = `
        <div class="p-8 md:p-12 flex-grow flex flex-col animate-fade-in max-h-full">
            <header class="mb-8 border-b border-slate-100 dark:border-slate-800 pb-6 text-center sm:text-left">
                <h2 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Review Your Answers</h2>
                <p class="text-slate-500 dark:text-slate-400 mt-2">Click any answer to jump back and change it.</p>
            </header>

            <div class="flex-grow overflow-hidden flex flex-col mb-8">
                <div class="overflow-y-auto pr-4 custom-scrollbar space-y-3" style="max-height: 50vh;">
                    ${state.answers.map((a, i) => `
                        <div onclick="state.step=3; state.index=${i}; render();" class="group p-4 bg-white dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700/60 rounded-2xl flex flex-col sm:flex-row sm:items-center justify-between gap-4 transition-all hover:border-indigo-400 hover:shadow-md cursor-pointer">
                            
                            <div class="flex-1">
                                <div class="flex items-start sm:items-center gap-3">
                                    <span class="shrink-0 flex items-center justify-center w-7 h-7 rounded-full bg-indigo-50 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 text-xs font-black border border-indigo-100 dark:border-indigo-800/50">${i+1}</span>
                                    <p class="text-sm font-semibold text-slate-800 dark:text-slate-200 leading-snug">
                                        ${QUESTIONS[state.type][i]}
                                    </p>
                                </div>
                            </div>
                            
                            <div class="sm:text-right shrink-0 ml-10 sm:ml-0">
                                <span class="inline-flex items-center justify-center px-4 py-2 bg-indigo-50/80 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300 rounded-xl font-bold text-sm border border-indigo-100 dark:border-indigo-800/50 group-hover:bg-indigo-600 group-hover:text-white transition-colors">
                                    ${opts.find(opt => opt.value === a).label}
                                </span>
                            </div>
                            
                        </div>
                    `).join("")}
                </div>
            </div>

            <div class="mt-auto pt-6 border-t border-slate-100 dark:border-slate-800 flex flex-col-reverse sm:flex-row gap-4 sm:justify-end">
                <button onclick="state.step = 3; state.index = 0; render();" class="${BTN_SECONDARY} w-full sm:w-auto">Start Over</button>
                <button onclick="submitAssessment()" id="submitBtn" class="${BTN_PRIMARY} w-full sm:w-auto hover:-translate-y-1">Submit Assessment</button>
            </div>
        </div>`;
}

async function submitAssessment() {
    const btn = document.getElementById('submitBtn');
    if(btn) btn.innerHTML = '<span class="animate-pulse">Processing...</span>';

    try {
        const { res, data } = await apiRequest(
            "/api/core/assessment/",
            "POST",
            {
                type: state.type,
                answers: state.answers
            }
        );

        if (res && res.ok) {
            state.results[state.type] = data.data;
            state.step = 5;
            render();
        } else {
            throw new Error("Submission Failed");
        }
    } catch (error) {
        console.error("Submission failed", error);
        alert("There was an error submitting your assessment. Please try again.");
        if(btn) btn.innerHTML = 'Try Again';
    }
}

function renderResult() {
    app.innerHTML = `
        <div class="flex-grow flex flex-col items-center justify-center p-10 md:p-16 text-center animate-fade-in">
            <div class="w-24 h-24 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 rounded-full flex items-center justify-center mb-8 shadow-[0_0_40px_rgba(16,185,129,0.2)] border border-emerald-100 dark:border-emerald-800/50">
                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
            </div>
            
            <h2 class="text-3xl md:text-4xl font-black text-slate-900 dark:text-white tracking-tight mb-4">Assessment Complete</h2>
            <p class="text-slate-500 dark:text-slate-400 mb-10 max-w-md mx-auto text-lg">Your responses have been securely saved and analyzed.</p>
            
            <div class="flex flex-col gap-4 w-full max-w-xs mx-auto">
                <button onclick="state.step = 6; render();" class="${BTN_PRIMARY} hover:-translate-y-1">View Full Report</button>
                <button onclick="window.location.href='/api/core/chatbot-page/'" class="${BTN_SECONDARY}">Discuss with Lumi</button>
                <button onclick="window.location.href='/api/core/dashboard-page/'" class="mt-4 text-sm font-bold text-slate-400 hover:text-slate-800 dark:hover:text-white transition-colors">Return to Dashboard</button>
            </div>
        </div>`;
}

/* =========================
   REPORT & CHART
========================= */
let reportChart = null;

function renderReport() {
    const resultData = state.results[state.type];
    const isDass = state.type === 'dass21';
    const recommendations = generateRecommendations(state.type, resultData.risk_level);

    app.innerHTML = `
        <div class="p-8 md:p-12 flex-grow flex flex-col animate-fade-in">
            <header class="border-b border-slate-100 dark:border-slate-800 pb-6 mb-8 text-center sm:text-left">
                <div class="inline-flex items-center justify-center px-4 py-1 mb-4 text-xs font-bold tracking-widest text-indigo-700 bg-indigo-50 dark:bg-indigo-900/30 dark:text-indigo-300 rounded-full uppercase">
                    ${TITLES[state.type]} Result
                </div>
                <h2 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Your Analysis</h2>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="md:col-span-2 bg-slate-50 dark:bg-slate-800/50 p-6 rounded-3xl border border-slate-100 dark:border-slate-700">
                    <div class="h-[250px] relative">
                        <canvas id="resultChart"></canvas>
                    </div>
                </div>
                
                <div class="flex flex-col gap-4">
                    <div class="p-6 border-2 border-slate-100 dark:border-slate-700 bg-white dark:bg-slate-800 rounded-3xl h-full flex flex-col justify-center items-center text-center">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Total Score</p>
                        <p class="text-5xl font-black text-slate-900 dark:text-white tracking-tighter">${resultData.score}</p>
                    </div>
                    <div class="p-6 border-2 border-slate-100 dark:border-slate-700 bg-indigo-600 rounded-3xl h-full flex flex-col justify-center items-center text-center shadow-lg shadow-indigo-500/30">
                        <p class="text-xs font-bold text-indigo-200 uppercase tracking-widest mb-2">Severity Risk</p>
                        <p class="text-2xl font-bold capitalize text-white">${resultData.risk_level.replace('_', ' ')}</p>
                    </div>
                </div>
            </div>

            <div class="bg-indigo-50/50 dark:bg-indigo-900/10 p-6 rounded-3xl border border-indigo-100/50 dark:border-indigo-800/30 mb-6">
                <h3 class="text-sm font-bold uppercase tracking-widest text-indigo-600 dark:text-indigo-400 mb-4">Assessment Insight</h3>
                <p class="text-slate-700 dark:text-slate-300 font-medium leading-relaxed">${resultData.insight || generateFallbackInsight(resultData.risk_level)}</p>
                <p class="text-xs text-slate-400 mt-4 italic">${resultData.disclaimer || "This is not a diagnosis. This is only a screening tool."}</p>
            </div>

            <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border border-slate-100 dark:border-slate-700 mb-8 shadow-sm">
                <h3 class="text-sm font-bold uppercase tracking-widest text-slate-800 dark:text-slate-200 mb-5 flex items-center gap-2">
                    <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Actionable Next Steps
                </h3>
                <ul class="space-y-3">
                    ${recommendations.map(rec => `
                        <li class="flex items-start gap-3 p-3 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
                            <div class="mt-0.5 shrink-0 w-6 h-6 rounded-full bg-emerald-50 dark:bg-emerald-900/30 flex items-center justify-center text-emerald-600 dark:text-emerald-400 border border-emerald-100 dark:border-emerald-800/50">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            <span class="text-sm font-medium text-slate-700 dark:text-slate-300 leading-snug">${rec}</span>
                        </li>
                    `).join('')}
                </ul>
            </div>

            <div class="pt-6 border-t border-slate-100 dark:border-slate-800 flex flex-col-reverse sm:flex-row gap-4 sm:justify-end">
                <button onclick="window.location.href='/api/core/dashboard-page/'" class="${BTN_SECONDARY} w-full sm:w-auto">Dashboard</button>
                <button onclick="location.reload()" class="${BTN_PRIMARY} w-full sm:w-auto hover:-translate-y-1">Take Another Test</button>
            </div>
        </div>`;

    renderChart(resultData, isDass);
}

function generateRecommendations(type, risk) {
    const isSevere = risk.includes('high') || risk.includes('severe') || risk.includes('extremely');
    const isModerate = risk.includes('moderate') || risk.includes('subthreshold');
    let category = isSevere ? 'severe' : (isModerate ? 'moderate' : 'good');

    if (type === 'isi') { // Insomnia
        if (category === 'severe') return [
            "Please consult a healthcare provider or sleep specialist.",
            "Implement a strict digital curfew 1 to 2 hours before bed.",
            "Avoid caffeine and heavy meals entirely after midday.",
            "Keep your bedroom strictly for sleep—dark, quiet, and cool.",
            "If you can't sleep after 20 minutes, leave the bed and do a quiet activity."
        ];
        if (category === 'moderate') return [
            "Try to maintain a consistent sleep schedule, even on weekends.",
            "Limit daytime naps to 20 minutes or avoid them entirely.",
            "Engage in relaxing activities before bed, like reading or listening to calm music.",
            "Ensure your sleeping environment is comfortable and distraction-free.",
            "Get plenty of natural sunlight during the early parts of the day."
        ];
        return [
            "Keep maintaining your consistent sleep schedule.",
            "Continue protecting your wind-down time before bed.",
            "Stay physically active during the day to promote healthy sleep.",
            "Keep your bedroom environment optimized for rest.",
            "Stick to your current caffeine and screen-time boundaries."
        ];
    }

    if (type === 'burnout') { // Burnout
        if (category === 'severe') return [
            "Strongly consider taking dedicated time off work to completely disconnect.",
            "Speak with a professional counselor or therapist to process this exhaustion.",
            "Have an honest conversation with your manager or team about your current workload.",
            "Completely unplug from work communications after hours—no exceptions.",
            "Focus entirely on basic restorative needs: sleeping, eating, and resting."
        ];
        if (category === 'moderate') return [
            "Set clear, rigid boundaries between work hours and personal time.",
            "Schedule short, mandatory breaks away from your desk during the workday.",
            "Practice delegating tasks and saying 'no' to non-essential requests.",
            "Engage in a hobby that is completely unrelated to your profession.",
            "Ensure you are taking a full, uninterrupted lunch break every day."
        ];
        return [
            "Continue enforcing healthy work-life boundaries.",
            "Keep acknowledging and celebrating your daily accomplishments.",
            "Maintain your regular breaks to prevent fatigue from building up.",
            "Stay connected with supportive colleagues and friends outside of work tasks.",
            "Keep investing time in your personal hobbies and passions."
        ];
    }

    // Default Mental Health (DASS21, PSS, WHO5)
    if (category === 'severe') return [
        "Reach out to a mental health professional for personalized guidance.",
        "Share how you are genuinely feeling with someone you deeply trust.",
        "Focus only on the immediate next step, rather than the overwhelming big picture.",
        "Practice a physical grounding technique (like the 5-4-3-2-1 method) when feeling panicked.",
        "Be incredibly gentle and patient with yourself right now; recovery takes time."
    ];
    
    if (category === 'moderate') return [
        "Incorporate 10 to 15 minutes of mindfulness, meditation, or deep breathing daily.",
        "Engage in light physical activity, such as a 20-minute daily walk.",
        "Consider journaling your thoughts to declutter your mind before bed.",
        "Ensure you are staying consistently hydrated and eating balanced meals.",
        "Limit your exposure to social media and stressful news cycles."
    ];
    
    return [
        "Keep up your current effective coping strategies—they are working!",
        "Take a moment to acknowledge your resilience and mental progress.",
        "Continue making dedicated time for activities that bring you genuine joy.",
        "Maintain your baseline physical health routines (sleep, diet, and exercise).",
        "Consider practicing daily gratitude to sustain this positive momentum."
    ];
}

function generateFallbackInsight(risk) {
    if (risk.includes('low') || risk === 'minimal' || risk === 'normal') return "Your scores indicate minimal to no significant symptoms currently. Maintain your current routines.";
    if (risk.includes('moderate') || risk.includes('subthreshold')) return "Elevated symptoms detected. Consider monitoring your routines and practicing self-care.";
    return "High severity detected. We strongly recommend discussing these feelings with a professional or trusted confidant.";
}

function renderChart(data, isDass) {
    const ctx = document.getElementById("resultChart");
    if(reportChart) reportChart.destroy();

    const isDark = document.documentElement.classList.contains('dark');
    const textColor = isDark ? '#94a3b8' : '#64748b'; 
    const gridColor = isDark ? '#334155' : '#f1f5f9';

    let labels = [TITLES[state.type]];
    let values = [data.score];
    let bgColors = ['rgba(79, 70, 229, 0.8)']; // Indigo

    // Extract breakdown if it's the DASS-21
    if (isDass && data.meta) {
        labels = ['Depression', 'Anxiety', 'Stress'];
        values = [data.meta.depression || 0, data.meta.anxiety || 0, data.meta.stress || 0];
        bgColors = [
            'rgba(59, 130, 246, 0.8)', // Blue
            'rgba(16, 185, 129, 0.8)', // Emerald
            'rgba(245, 158, 11, 0.8)'  // Amber
        ];
    }

    reportChart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: bgColors,
                borderRadius: 8,
                borderSkipped: false,
                barThickness: isDass ? 40 : 80
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { color: textColor, font: { weight: '600' } },
                    border: { display: false },
                    grid: { color: gridColor, drawBorder: false }
                },
                x: {
                    ticks: { color: textColor, font: { weight: '600' } },
                    border: { display: false },
                    grid: { display: false }
                }
            }
        }
    });
}

// Initialize
render();
</script>
