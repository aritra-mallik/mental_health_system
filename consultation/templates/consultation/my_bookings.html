{% extends "base.html" %}
{% block content %}

<div class="max-w-5xl mx-auto p-6">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">My Bookings</h1>

        <a href="/consultation/"
           class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-500 transition">
           Back to Home
        </a>
    </div>

    <!-- Loading Skeleton -->
    <div id="loading" class="space-y-4">
        <div class="animate-pulse bg-gray-200 h-16 rounded"></div>
        <div class="animate-pulse bg-gray-200 h-16 rounded"></div>
        <div class="animate-pulse bg-gray-200 h-16 rounded"></div>
    </div>

    <!-- Error -->
    <div id="error" class="hidden text-red-600 mb-4"></div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden text-center mt-10">
        <p class="text-gray-500">No bookings yet</p>
        <a href="/consultation/"
           class="mt-3 inline-block bg-blue-600 text-white px-4 py-2 rounded">
           Book Now
        </a>
    </div>

    <!-- Booking List -->
    <div id="bookingList" class="space-y-4 hidden"></div>

</div>

<script>

function getStatusColor(status){
    if(status === "Confirmed") return "text-green-600";
    if(status === "Pending") return "text-yellow-600";
    if(status === "Cancelled") return "text-red-600";
    return "text-gray-600";
}

async function loadBookings(){

    const loading = document.getElementById("loading");
    const errorBox = document.getElementById("error");
    const list = document.getElementById("bookingList");
    const empty = document.getElementById("emptyState");

    // Reset UI
    loading.classList.remove("hidden");
    list.classList.add("hidden");
    empty.classList.add("hidden");
    errorBox.classList.add("hidden");

    try {

        // ✅ Use safe API endpoint (avoid conflict)
        const res = await fetch("/api/consultation/my-bookings-api/");

        if(!res.ok){
            throw new Error("HTTP error " + res.status);
        }

        const text = await res.text();

        // 🔴 Prevent crash if HTML returned instead of JSON
        let data;
        try {
            data = JSON.parse(text);
        } catch (e) {
            throw new Error("Invalid JSON (maybe wrong API URL)");
        }

        console.log("API RESPONSE:", data);

        loading.classList.add("hidden");

        if(!Array.isArray(data) || data.length === 0){
            empty.classList.remove("hidden");
            return;
        }

        let html = "";

        data.forEach(b => {
            html += `
            <div class="bg-white p-4 rounded-xl shadow flex justify-between items-center hover:shadow-md transition">

                <div>
                    <p class="font-semibold text-lg">${b.counselor || "N/A"}</p>
                    <p class="text-gray-500 text-sm">${b.date || ""} • ${b.time || ""}</p>
                </div>

                <div class="text-right">
                    <span class="${getStatusColor(b.status)} font-semibold">
                        ${b.status || "Unknown"}
                    </span>
                </div>

            </div>
            `;
        });

        list.innerHTML = html;
        list.classList.remove("hidden");

    } catch (err) {
        console.error(err);
        loading.classList.add("hidden");
        errorBox.innerText = "Unable to load bookings. Please try again.";
        errorBox.classList.remove("hidden");
    }
}

loadBookings();

</script>

{% endblock %}
