{% extends "base.html" %}
{% block content %}

<div class="max-w-7xl mx-auto p-6 w-full">

<!-- Header -->
<div class="mb-6 flex justify-between items-center w-full">

    <!-- LEFT -->
    <div>
        <h1 class="text-3xl font-bold">Find a Counselor</h1>
        <p class="text-gray-700">Browse verified professionals and choose the right fit</p>
    </div>

    <!-- RIGHT BUTTON GROUP -->
    <div class="flex gap-3">

       <a href="/consultation/my-bookings/"
            style="background-color:#1d4ed8; color:white; opacity:1;"
            class="px-5 py-2 rounded-lg shadow-lg hover:bg-blue-600 transition font-semibold">
            My Bookings
        </a>

        <a href="/consultation/book/"
           class="bg-blue-600 text-white px-5 py-2 rounded-lg shadow hover:bg-blue-500 transition font-medium">
           Book
        </a>

    </div>

</div>

<!-- Search -->
<div class="mb-6">
    <input id="searchInput"
           type="text"
           placeholder="Search by name..."
           class="border p-2 rounded w-72">
</div>

<!-- ✅ FLEX LAYOUT (FIXED ISSUE) -->
<div id="counselorList" class="flex flex-wrap gap-6"></div>

</div>

<style>
/* Smooth dropdown animation */
.dropdown {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
}
.dropdown.open {
    max-height: 600px;
}
</style>

<script>

let allCounselors = [];

/* LOAD LIST */
async function loadCounselors() {

    const container = document.getElementById("counselorList");

    // Skeleton Loader
    container.innerHTML = `
        ${[1,2,3].map(() => `
        <div class="bg-white p-5 rounded-xl shadow w-full md:w-[48%] lg:w-[31%] animate-pulse">
            <div class="h-4 bg-gray-300 rounded w-1/2 mb-2"></div>
            <div class="h-3 bg-gray-200 rounded w-1/3"></div>
            <div class="h-8 bg-gray-200 rounded mt-4"></div>
        </div>
        `).join("")}
    `;

   const res = await fetch("/consultation/api/counselors/");
    const data = await res.json();

    allCounselors = data;
    renderCounselors(data);
}

/* RENDER */
function renderCounselors(data) {

    const container = document.getElementById("counselorList");
    container.innerHTML = "";

    data.forEach(c => {

        container.innerHTML += `
        <!-- ✅ FIXED WIDTH CARD -->
        <div class="bg-white p-5 rounded-xl shadow w-full md:w-[48%] lg:w-[31%] transition hover:shadow-lg">

            <div class="flex justify-between">
                <div>
                    <h2 class="font-bold text-lg">${c.name}</h2>
                    <p class="text-gray-500">${c.designation}</p>
                </div>

                <span class="text-green-600 font-bold">₹${c.consultation_fee}</span>
            </div>

            <button onclick="toggleDetails(${c.id}, this)"
                class="mt-3 bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-500 transition">
                View Details
            </button>

            <div id="detail-${c.id}" class="dropdown mt-3"></div>

        </div>`;
    });
}

/* TOGGLE DETAILS */
async function toggleDetails(id, btn){

    const detailDiv = document.getElementById(`detail-${id}`);

    // Close others
    document.querySelectorAll('.dropdown').forEach(d => {
        if(d !== detailDiv){
            d.classList.remove("open");
            d.innerHTML = "";
        }
    });

    document.querySelectorAll('button').forEach(b => {
        if(b !== btn && b.innerText === "Hide Details"){
            b.innerText = "View Details";
        }
    });

    // Toggle current
    if(detailDiv.classList.contains("open")){
        detailDiv.classList.remove("open");
        detailDiv.innerHTML = "";
        btn.innerText = "View Details";
        return;
    }

    // Skeleton loader inside dropdown
    detailDiv.innerHTML = `
        <div class="animate-pulse space-y-2">
            <div class="h-3 bg-gray-300 rounded w-full"></div>
            <div class="h-3 bg-gray-200 rounded w-5/6"></div>
            <div class="h-3 bg-gray-200 rounded w-4/6"></div>
        </div>
    `;
    detailDiv.classList.add("open");

    // Lazy fetch
    const res = await fetch(`/api/consultation/counselors/${id}/`);
    const c = await res.json();

    let html = `
        <div class="border-t pt-3 text-sm space-y-1">

            <p><b>Bio:</b> ${c.bio || "N/A"}</p>
            <p><b>Education:</b> ${c.education || "N/A"}</p>
            <p><b>University:</b> ${c.university || "N/A"}</p>

            <p><b>Experience:</b> ${c.experience_years} years</p>
            <p><b>Patients Treated:</b> ${c.patients_treated}</p>
            <p><b>Success Rate:</b> ${c.success_rate}%</p>

            <p><b>Rating:</b> ${c.rating} ⭐ (${c.review_count} reviews)</p>

            <p><b>Session Duration:</b> ${c.session_duration} mins</p>

            <p><b>Hospitals:</b> ${c.hospitals || "N/A"}</p>
            <p><b>Achievements:</b> ${c.achievements || "N/A"}</p>
            <p><b>Research Work:</b> ${c.research_work || "N/A"}</p>
            <p><b>Innovations:</b> ${c.innovations || "N/A"}</p>

        </div>
    `;

    detailDiv.innerHTML = html;
    btn.innerText = "Hide Details";
}

/* INIT */
loadCounselors();

</script>

{% endblock %}
