{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="max-w-3xl mx-auto mt-10 px-4">

    <!-- Article Card -->
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 border border-gray-200 dark:border-gray-700">

        <!-- Title -->
        <h2 class="text-2xl md:text-3xl font-bold text-gray-900 dark:text-white mb-4">
            {{ article.title }}
        </h2>

        <!-- Summary -->
        <p class="text-gray-600 dark:text-gray-300 leading-relaxed text-[15px]">
            {{ article.full }}
        </p>

        <!-- Buttons -->
        <div class="flex flex-wrap gap-4 mt-8">

            <a href="/api/core/dashboard-page/" 
               class="px-5 py-2 rounded-lg bg-gray-500 hover:bg-gray-600 text-white transition">
                ⬅ Back
            </a>

            <button onclick="openWarningModal()" 
                class="px-5 py-2 rounded-lg bg-red-500 hover:bg-red-600 text-white transition shadow">
                🌐 View More
            </button>

        </div>

    </div>

</div>


<!-- 🔥 MODAL -->
<div id="warningModal" 
     class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50">

    <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-2xl max-w-md w-full text-center animate-fadeIn">

        <h3 class="text-xl font-bold text-red-500 mb-2">
            External Redirect
        </h3>

        <p class="text-gray-600 dark:text-gray-300 mb-4 text-sm">
            You are about to leave this app and visit:
        </p>

        <!-- Domain Preview -->
        <p id="domainText" class="text-indigo-600 font-semibold mb-5"></p>

        <div class="flex justify-center gap-4">

            <button onclick="closeModal()" 
                class="px-4 py-2 bg-gray-400 hover:bg-gray-500 text-white rounded-lg transition">
                Cancel
            </button>

            <button onclick="proceedRedirect()" 
                class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition shadow">
                Continue
            </button>

        </div>

    </div>
</div>


<!-- 🔥 SCRIPT -->
<script>
let articleLink = "{{ article.link|escapejs }}";

function openWarningModal() {
    const modal = document.getElementById("warningModal");

    // Show modal
    modal.classList.remove("hidden");
    modal.classList.add("flex");

    // Show domain name (nice UX)
    try {
        const domain = new URL(articleLink).hostname;
        document.getElementById("domainText").innerText = domain;
    } catch {
        document.getElementById("domainText").innerText = articleLink;
    }
}

function closeModal() {
    document.getElementById("warningModal").classList.add("hidden");
}

function proceedRedirect() {
    if (articleLink && articleLink.startsWith("http")) {
        window.open(articleLink, "_blank");
    } else {
        alert("Invalid article link.");
    }
}

// Optional: close modal on outside click
window.onclick = function(event) {
    const modal = document.getElementById("warningModal");
    if (event.target === modal) {
        modal.classList.add("hidden");
    }
};
</script>


<!-- 🔥 OPTIONAL ANIMATION -->
<style>
@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}
.animate-fadeIn {
    animation: fadeIn 0.25s ease-in-out;
}
</style>

{% endblock %}
